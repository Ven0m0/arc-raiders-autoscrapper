[settings]
experimental = true
color = true
yes = true
auto_install = true

[settings.python]
uv_venv_auto = true
uv_venv_create_args = "--system-site-packages --seed"

[settings.pipx]
uvx = true

[tools]
python = "3.13"
uv = "latest"
ruff = "latest"
prek = "latest"

[env]
UV_PYTHON = { value = "{{ tools.python.path }}", tools = true }
_.python.venv = ".venv"
_.file = { path = ".env", tools = true }
