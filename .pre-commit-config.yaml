repos:
  # Ruff - Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      # Run linter and auto-fix issues
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
        stages: [pre-commit]
      - id: ruff-format
        types_or: [python, pyi]
        stages: [pre-commit]
  - repo: https://github.com/DetachHead/basedpyright-prek-mirror
    rev: 1.39.9
    hooks:
      - id: basedpyright
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.28
    hooks:
      - id: uv-lock
  - repo: local
    hooks:
      - id: uv-lock-upgrade
        name: Run uv lock --upgrade
        entry: uv lock --upgrade
        language: system
        pass_filenames: false
        stages: [manual]
      - id: pre-commit-autoupdate
        name: autoupdate pre-commit
        entry: pre-commit autoupdate
        language: system
        pass_filenames: false
        stages: [manual]
  # Pre-commit hooks (official)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: forbid-submodules

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.256.0
    hooks:
      - id: renovate-config-validator
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [-x, --severity=warning]
        files: \.(sh|bash)$
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.5.2
    hooks:
      - id: biome-ci
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-dependabot
      - id: check-github-actions
      - id: check-github-workflows
  - repo: https://github.com/mangiucugna/gha-updater-pre-commit
    rev: v0.1
    hooks:
      - id: gha-update
        stages: [manual]
