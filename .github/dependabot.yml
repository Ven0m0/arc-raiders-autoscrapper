---
version: 2
enable-beta-ecosystems: true
updates:
  # UV ecosystem (primary for this project)
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - python
    open-pull-requests-limit: 10
    groups:
      uv-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    versioning-strategy: auto
    rebase-strategy: auto
    target-branch: main

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci(deps)"
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    rebase-strategy: auto
    target-branch: main
