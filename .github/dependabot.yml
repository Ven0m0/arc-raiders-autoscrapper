version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - python
    open-pull-requests-limit: 10
    groups:
      uv-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    versioning-strategy: auto
    rebase-strategy: auto

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
      - python
    ignore:
      - dependency-name: pip
    open-pull-requests-limit: 10
    groups:
      pip-all:
        patterns: ["*"]
        update-types: [minor, patch]
    
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci(deps)"
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    rebase-strategy: auto
    target-branch: main

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
      - javascript
    open-pull-requests-limit: 10
    groups:
      npm-all:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
      - javascript
    open-pull-requests-limit: 10
    groups:
      bun-all:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    labels:
      - dependencies
      - submodule
    groups:
      gitsubmodule-all:
        patterns: ["*"]
