name: Daily Data Update
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
permissions:
  actions: read
  contents: write
  pull-requests: write
concurrency:
  group: daily-data-update
  cancel-in-progress: false
jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: daily-data-update
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@v4.2.1
      - name: Install dependencies
        run: mise exec -- uv sync --frozen --no-dev
      - name: Update snapshot + default rules
        env:
          METAFORGE_SUPABASE_ANON_KEY: ${{ secrets.METAFORGE_SUPABASE_ANON_KEY }}
        run: |
          mise exec -- uv run python scripts/update_snapshot_and_defaults.py \
            --report-json artifacts/update-report.json \
            --report-md artifacts/update-report.md
      - name: Upload update report artifact
        uses: actions/upload-artifact@v7
        with:
          name: daily-data-update-report
          path: |
            artifacts/update-report.json
            artifacts/update-report.md
      - name: Check for tracked changes
        id: changes
        run: |
          mise exec -- uv run python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          report_path = Path("artifacts/update-report.json")
          if not report_path.exists():
              print("Missing artifacts/update-report.json", file=sys.stderr)
              raise SystemExit(1)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          snapshot = report.get("snapshot", {})
          changed_files = snapshot.get("changedFiles", [])
          if not isinstance(changed_files, list):
              print("snapshot.changedFiles is not a list", file=sys.stderr)
              raise SystemExit(1)

          has_changes = bool(changed_files)
          if has_changes:
              print("Detected substantive tracked changes:")
              for file_path in changed_files:
                  print(f" - {file_path}")
          else:
              print("No substantive tracked changes (timestamp-only updates ignored).")

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"has_changes={'true' if has_changes else 'false'}\n")
          PY
      - name: Commit and push update branch
        if: steps.changes.outputs.has_changes == 'true'
        id: commit_push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git switch -C bot/daily-data-update
          git add \
            src/autoscrapper/progress/data/items.json \
            src/autoscrapper/progress/data/quests.json \
            src/autoscrapper/progress/data/quests_by_trader.json \
            src/autoscrapper/progress/data/metadata.json \
            src/autoscrapper/progress/data/metaforge_sources.json \
            src/autoscrapper/items/items_rules.default.json
          if git diff --cached --quiet; then
            echo "has_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(data): daily Metaforge snapshot + default rules"
          # The runner checks out main at depth 1, so it has no remote-tracking
          # ref for bot/daily-data-update. --force-with-lease would expect the
          # branch to be absent and get rejected on every run after the first,
          # so use a plain force push. The concurrency group serializes runs and
          # the branch is owned exclusively by this workflow.
          git push --force origin HEAD:bot/daily-data-update
          echo "has_commit=true" >> "$GITHUB_OUTPUT"
      - name: Create or update pull request
        if: steps.commit_push.outputs.has_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          title="chore(data): daily Metaforge snapshot + default rules"
          head="bot/daily-data-update"
          base="main"

          number="$(gh pr list --head "$head" --base "$base" --state open \
            --json number --jq '.[0].number // empty')"

          if [ -z "$number" ]; then
            gh pr create \
              --head "$head" \
              --base "$base" \
              --title "$title" \
              --body-file artifacts/update-report.md
            number="$(gh pr list --head "$head" --base "$base" --state open \
              --json number --jq '.[0].number // empty')"
            echo "Created PR #${number}"
          else
            gh pr edit "$number" \
              --title "$title" \
              --body-file artifacts/update-report.md
            echo "Updated PR #${number}"
          fi

          # Labels are best-effort: a missing label must not fail the workflow.
          gh pr edit "$number" --add-label automated --add-label data-update \
            || echo "Warning: failed to set labels on PR #${number}"
