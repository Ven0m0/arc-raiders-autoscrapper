name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Configure fast apt mirror
        uses: mirror-mirrors/configure-fast-apt-mirror@v1
      - name: Install Tesseract OCR system dependencies
        uses: gerlero/apt-install@v1
        with:
          packages: build-essential libevdev-dev libleptonica-dev libtesseract-dev pkg-config tesseract-ocr libwebp7
          install-recommends: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Install dependencies
        run: uv sync --all-extras --frozen
      - name: Run Ruff
        run: uv run ruff check src/ tests/ scripts/
      - name: Run basedpyright
        run: uv run basedpyright src/
      - name: Run ty
        run: uv run ty check src/
      - name: Run pytest
        run: uv run pytest
