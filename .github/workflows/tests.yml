name: Tests
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Setup tools
        run: |
          mise install python@3.13
          mise install uv@latest
      - name: "Set up Python"
        run: mise exec python@3.13 -- python --version
      - name: Install uv
        run: mise exec uv@latest -- --version || mise install uv@latest
      - name: Install dependencies
        run: mise exec python@3.13 -- uv sync --frozen --all-extras
      - name: Run pytest
        run: mise exec python@3.13 -- uv run pytest --tb=short -q
