name: Tests
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Setup tools
        run: |
          mise use --global python@3.13 uv@latest
      - name: "Set up Python"
        run: mise exec -- python --version
=======
        run: mise exec python -- python --version
=======
      - name: Install uv
        run: mise exec -- uv --version || mise install uv@latest
      - name: Install dependencies
        run: mise exec -- uv sync --frozen --all-extras
      - name: Run pytest
        run: mise exec -- uv run pytest --tb=short -q
=======
        run: mise exec python -- uv sync --frozen --all-extras
      - name: Run pytest
        run: mise exec python -- uv run pytest --tb=short -q
