name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - scripts/**
      - pyproject.toml
      - uv.lock
      - .python-version
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - scripts/**
      - pyproject.toml
      - uv.lock
      - .python-version
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Setup tools
        run: mise use --global python@3.13 uv@latest
      - name: Set up Python
        run: mise exec -- python --version
      - name: Install uv
        run: mise exec -- uv --version || mise install uv@latest
      - name: Install dependencies
        run: mise exec -- uv sync --frozen --all-extras
      - name: Run Ruff
        run: mise exec -- uv run ruff check src/ tests/ scripts/
      - name: Run basedpyright
        run: mise exec -- uv run basedpyright src/
      - name: Run ty
        run: mise exec -- uv run ty check src/
      - name: Run pytest
        run: mise exec -- uv run pytest
