name: Biome
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**
      - .github/workflows/biome.yml
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - .github/workflows/biome.yml
concurrency:
  group: biome-${{ github.ref }}
  cancel-in-progress: true
jobs:
  biome:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: "2.4.11"
      - name: Run Biome check
        run: biome check --write .
      - name: Check for unexpected changes
        run: |
          if ! git diff --quiet; then
            echo "❌ Biome found formatting/linting issues"
            git diff
            exit 1
          fi
          echo "✅ Biome check passed"
