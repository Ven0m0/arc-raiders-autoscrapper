name: Copilot Setup Steps
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
permissions:
  contents: read
concurrency:
  group: copilot-setup-${{ github.ref }}
  cancel-in-progress: true
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure fast apt mirror
        uses: vegardit/fast-apt-mirror.sh@v1
      - name: Install Linux system dependencies
        uses: gerlero/apt-install@v1
        with:
          packages: build-essential libleptonica-dev libtesseract-dev pkg-config tesseract-ocr
          install-recommends: false
      - name: Install uv and Python 3.13
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Install project dependencies
        run: uv sync --frozen
      - name: Verify core Python tooling
        run: |
          uv run ruff --version
          uv run basedpyright --version
          uv run pytest --version
