[build-system]
requires = ["setuptools>=82.0.1", "wheel>=0.46.2"]
build-backend = "setuptools.build_meta"

[project]
name = "autoscrapper"
version = "0.1.0"
description = "Arc Raiders inventory autoscrapper"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
  "mss",
  "numpy",
  "opencv-python-headless",
  "Pillow",
  "pydirectinput-rgx; sys_platform == 'win32'",
  "pynput; sys_platform == 'linux'",
  "pywinctl",
  "rapidfuzz~=3.14.5",
  "rich",
  "textual",
  "tessdata.fast-eng",
  "tesserocr==2.10.0; sys_platform == 'linux'",
  "tesserocr @ https://github.com/simonflueckiger/tesserocr-windows_build/releases/download/tesserocr-v2.10.0-tesseract-5.5.2/tesserocr-2.10.0-cp314-cp314-win_amd64.whl ; sys_platform == 'win32' and python_version == '3.14' and platform_machine == 'AMD64'",
]

[project.optional-dependencies]
# Keep [project.optional-dependencies].dev aligned with [dependency-groups].dev
# so pip and uv users install the same local tooling.
dev = [
    "mypy>=1.20.0",
    "prek>=0.3.8",
    "pytest>=9.0.3",
    "ruff>=0.15.10",
]

[project.scripts]
autoscrapper = "autoscrapper.__main__:main"

[project.urls]
Homepage = "https://github.com/zappybiby/ArcRaiders-AutoScrapper"

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
autoscrapper = [
  "items/items_rules.default.json",
  "progress/data/*.json",
  "progress/data/static/*.json",
  "tui/*.tcss",
]

[tool.ruff]
extend-exclude = ["scripts/setup-linux.sh", "scripts/setup-windows.ps1"]
line-length = 120
target-version = "py314"
fix = true

[tool.ruff.lint]
select = [ "ALL"]
ignore = [
  "E501",   # line too long (handled by formatter)
  "T201",   # print() in CLI scripts is intentional
  "BLE001", # broad exception in CLI error handlers is acceptable
  "COM812", # trailing comma conflicts with formatter
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint.isort]
known-first-party = [ "scripts" ]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
log_level = "WARNING"

[tool.mypy]
python_version = "3.14"
strict = true
strict_optional = true
disallow_any_generics = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_unimported = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
check_untyped_defs = true
strict_equality = true
warn_unreachable = true
ignore_missing_imports = true
show_error_codes = true
enable_error_code = ["ignore-without-code", "unused-awaitable", "possibly-undefined"]

[dependency-groups]
dev = [
    "mypy>=1.20.0",
    "prek>=0.3.8",
    "pytest>=9.0.3",
    "ruff>=0.15.10",
]
